abstract: The graph attention (GAT) mechanism has been instrumental in enabling nodes to aggregate information from their neighbours based on relevancies, significantly enhancing the adaptiveness of graph neural networks across various graph representation learning tasks. Recent research has sought to further leverage the power of GAT for tasks that require capturing long-range data dependencies. However, the conventional stacking of L GAT layers leads to excessive memory footprint and computation overhead, with complexities of O(L) for its optimization. To address these challenges, this study proposes Attentive Long-Short-range message passing (ALS), which follows the successful integration of GAT and the personalized PageRank to capture complex and long-range data dependencies, with implicit differentiation to achieve O(1) memory footprint and acceleration techniques like conjugate gradient to reduce up to 89.51% computation time. Extensive experiments validate ALS’s robustness and state-of-the-art performance on homophilic graphs, heterophilic graphs, and long-range graph benchmarks, with strong baselines including recently studied Graph Transformers and Graph Mamba. Code is available at https://github.com/cf020031308/ALS.
author: Yi Luo and Xu Sun and Guangchun Luo and Aiguo Chen
